{% extends "base.html" %}
{% block title %}تسجيل مدرسة - {{ platform_name }}{% endblock %}

{% block content %}
<div class="container">
    <h2 class="mb-4">تسجيل مدرسة جديدة</h2>
    <div class="card">
        <div class="card-body">
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">اسم المدرسة (إنجليزي)</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">اسم المدرسة (عربي)</label>
                        <input type="text" name="name_ar" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">الرمز</label>
                        <input type="text" name="code" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">المنطقة</label>
                        <input type="text" name="region" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">المقاطعة</label>
                        <input type="text" name="district" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">الهاتف</label>
                        <input type="text" name="phone" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">البريد الإلكتروني</label>
                        <input type="email" name="email" class="form-control">
                    </div>
                    <div class="col-12">
                        <label class="form-label">العنوان</label>
                        <textarea name="address" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">اسم المدير</label>
                        <input type="text" name="principal_name" class="form-control">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary mt-4">تسجيل المدرسة</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
